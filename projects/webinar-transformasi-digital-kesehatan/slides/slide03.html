<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: #1E5128;
  padding: 10pt 40pt;
}
h1 {
  color: #ffffff;
  font-size: 24pt;
  font-weight: bold;
  margin: 0;
}
.content {
  flex: 1;
  display: flex;
  padding: 6pt 40pt 80pt 40pt;
  gap: 10pt;
}
.text-column {
  flex: 0 0 35%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
h2 {
  color: #2C3E50;
  font-size: 12pt;
  font-weight: bold;
  margin: 0 0 5pt 0;
}
ul {
  margin: 0;
  padding-left: 10pt;
  color: #2C3E50;
  font-size: 8pt;
  line-height: 1.15;
}
li {
  margin-bottom: 2pt;
}
.visual-column {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.diagram-placeholder {
  width: 100%;
  height: 100%;
  min-height: 220pt;
  background: #ECF0F1;
  border: 3pt dashed #4E9F3D;
  border-radius: 12pt;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8pt;
  padding: 15pt;
}
.placeholder-text {
  color: #2C3E50;
  font-size: 13pt;
  font-weight: bold;
  text-align: center;
  margin: 0;
}
.placeholder-subtext {
  color: #7F8C8D;
  font-size: 10pt;
  text-align: center;
  margin: 0;
}
</style>
</head>
<body>
  <div class="header">
    <h1>Fondasi yang Telah Dibangun (2024)</h1>
  </div>
  <div class="content">
    <div class="text-column">
      <h2>Platform SATUSEHAT</h2>
      <ul>
        <li>Single source of truth</li>
        <li>17 FHIR resources</li>
        <li>Standardisasi terminologi</li>
        <li>Sistem registrasi terstandar</li>
      </ul>
    </div>
    <div class="visual-column">
      <div class="diagram-placeholder">
        <p class="placeholder-text">DIAGRAM EKOSISTEM SATUSEHAT</p>
        <p class="placeholder-subtext">Tambahkan diagram ekosistem SATUSEHAT di PowerPoint</p>
      </div>
    </div>
  </div>
</body>
</html>

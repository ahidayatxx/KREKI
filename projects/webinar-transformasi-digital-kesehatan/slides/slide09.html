<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: #C0392B;
  padding: 10pt 40pt;
}
h1 {
  color: #ffffff;
  font-size: 20pt;
  font-weight: bold;
  margin: 0;
}
.content {
  flex: 1;
  display: flex;
  padding: 5pt 40pt 88pt 40pt;
  gap: 15pt;
}
.text-column {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 5pt;
}
.dimension-item {
  display: flex;
  align-items: center;
  gap: 10pt;
  padding: 4pt 8pt;
  background: #ECF0F1;
  border-radius: 8pt;
}
.dimension-number {
  background: #C0392B;
  color: #ffffff;
  font-size: 13pt;
  font-weight: bold;
  width: 26pt;
  height: 26pt;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.dimension-text {
  color: #2C3E50;
  font-size: 10pt;
  font-weight: bold;
}
.visual-column {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.diagram-placeholder {
  width: 100%;
  height: 100%;
  min-height: 230pt;
  background: #ECF0F1;
  border: 3pt dashed #C0392B;
  border-radius: 10pt;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8pt;
  padding: 12pt;
}
.placeholder-text {
  color: #2C3E50;
  font-size: 13pt;
  font-weight: bold;
  text-align: center;
  margin: 0;
}
.placeholder-subtext {
  color: #7F8C8D;
  font-size: 9pt;
  text-align: center;
  margin: 0;
}
</style>
</head>
<body>
  <div class="header">
    <h1>Lima Dimensi Tantangan Keberlanjutan</h1>
  </div>
  <div class="content">
    <div class="text-column">
      <div class="dimension-item">
        <div class="dimension-number"><p style="margin:0">1</p></div>
        <p class="dimension-text">Infrastruktur & Konektivitas</p>
      </div>
      <div class="dimension-item">
        <div class="dimension-number"><p style="margin:0">2</p></div>
        <p class="dimension-text">Sumber Daya Manusia</p>
      </div>
      <div class="dimension-item">
        <div class="dimension-number"><p style="margin:0">3</p></div>
        <p class="dimension-text">Interoperabilitas & Data Quality</p>
      </div>
      <div class="dimension-item">
        <div class="dimension-number"><p style="margin:0">4</p></div>
        <p class="dimension-text">Governance & Sustainabilitas</p>
      </div>
      <div class="dimension-item">
        <div class="dimension-number"><p style="margin:0">5</p></div>
        <p class="dimension-text">Ekosistem Inovasi</p>
      </div>
    </div>
    <div class="visual-column">
      <div class="diagram-placeholder">
        <p class="placeholder-text">PENTAGON FRAMEWORK</p>
        <p class="placeholder-subtext">Tambahkan diagram pentagon di PowerPoint</p>
      </div>
    </div>
  </div>
</body>
</html>

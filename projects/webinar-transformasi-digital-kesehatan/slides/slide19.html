<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: #1E5128;
  padding: 10pt 40pt;
}
h1 {
  color: #ffffff;
  font-size: 24pt;
  font-weight: bold;
  margin: 0;
}
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 6pt 40pt 85pt 40pt;
  gap: 10pt;
}
.vision-box {
  background: #1E5128;
  border-radius: 12pt;
  padding: 15pt;
  text-align: center;
}
.vision-title {
  color: #ffffff;
  font-size: 16pt;
  font-weight: bold;
  margin: 0 0 10pt 0;
}
.vision-list {
  text-align: left;
  margin: 0;
  padding-left: 20pt;
}
.vision-list li {
  color: #ffffff;
  font-size: 9pt;
  line-height: 1.3;
  margin-bottom: 5pt;
}
.closing-statement {
  background: #C0392B;
  color: #ffffff;
  padding: 10pt;
  border-radius: 10pt;
  text-align: center;
}
.closing-text {
  font-size: 12pt;
  font-weight: bold;
  margin: 0;
}
</style>
</head>
<body>
  <div class="header">
    <h1>Visi 2029 dan Beyond</h1>
  </div>
  <div class="content">
    <div class="vision-box">
      <h2 class="vision-title">Indonesia sebagai Digital Health Leader 2029</h2>
      <ul class="vision-list">
        <li>Universal health coverage powered by data</li>
        <li>AI-enabled precision medicine untuk 270 juta rakyat</li>
        <li>Regional digital health hub</li>
        <li>Mature innovation ecosystem</li>
      </ul>
    </div>
    <div class="closing-statement">
      <p class="closing-text">Indonesia Sehat menuju Indonesia Emas 2045</p>
    </div>
  </div>
</body>
</html>

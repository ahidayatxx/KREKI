<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: #C0392B;
  padding: 10pt 40pt;
}
h1 {
  color: #ffffff;
  font-size: 18pt;
  font-weight: bold;
  margin: 0;
}
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 6pt 40pt 85pt 40pt;
  gap: 10pt;
}
.warning-box {
  background: #FFEBEE;
  border-left: 5pt solid #C0392B;
  padding: 10pt 15pt;
  border-radius: 8pt;
}
h2 {
  color: #C0392B;
  font-size: 14pt;
  font-weight: bold;
  margin: 0 0 8pt 0;
}
ul {
  margin: 0;
  padding-left: 15pt;
  color: #2C3E50;
  font-size: 9pt;
  line-height: 1.2;
}
li {
  margin-bottom: 4pt;
}
.imperative {
  background: #1E5128;
  color: #ffffff;
  padding: 12pt;
  border-radius: 10pt;
  text-align: center;
}
.imperative-text {
  font-size: 11pt;
  font-weight: bold;
  margin: 0;
}
</style>
</head>
<body>
  <div class="header">
    <h1>Risiko: Transformasi Digital Memperlebar Kesenjangan</h1>
  </div>
  <div class="content">
    <div class="warning-box">
      <h2>Digital Divide & Equity</h2>
      <ul>
        <li>Populasi vulnerable: lansia, pendidikan rendah, wilayah terpencil</li>
        <li>Privacy concerns dapat menurunkan trust</li>
        <li>Algorithmic bias dalam AI/ML kesehatan</li>
      </ul>
    </div>
    <div class="imperative">
      <p class="imperative-text">Imperatif: Digital transformation must be inclusive</p>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: #C0392B;
  padding: 10pt 40pt;
}
h1 {
  color: #ffffff;
  font-size: 20pt;
  font-weight: bold;
  margin: 0;
}
.content {
  flex: 1;
  display: flex;
  padding: 6pt 40pt 85pt 40pt;
  gap: 15pt;
}
.text-column {
  flex: 0 0 40%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
h2 {
  color: #C0392B;
  font-size: 15pt;
  font-weight: bold;
  margin: 0 0 8pt 0;
}
.stat-highlight {
  color: #C0392B;
  font-size: 32pt;
  font-weight: bold;
  margin: 5pt 0;
}
.stat-label {
  color: #2C3E50;
  font-size: 9pt;
  margin-bottom: 8pt;
}
ul {
  margin: 8pt 0 0 0;
  padding-left: 15pt;
  color: #2C3E50;
  font-size: 9pt;
  line-height: 1.2;
}
.chart-column {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.chart-placeholder {
  width: 100%;
  height: 100%;
  min-height: 240pt;
  background: #ECF0F1;
  border-radius: 10pt;
}
</style>
</head>
<body>
  <div class="header">
    <h1>Kesenjangan Infrastruktur yang Masih Lebar</h1>
  </div>
  <div class="content">
    <div class="text-column">
      <h2>Tantangan #1: Infrastruktur</h2>
      <p class="stat-highlight">75%</p>
      <p class="stat-label">Puskesmas belum terhubung internet baik</p>
      <p class="stat-highlight">86%</p>
      <p class="stat-label">Sekolah tanpa akses internet tetap</p>
      <ul>
        <li>Disparitas urban-rural tetap signifikan</li>
        <li>Target 2.500 desa vs 83.000+ desa total</li>
      </ul>
    </div>
    <div class="chart-column">
      <div id="infraChart" class="chart-placeholder"></div>
    </div>
  </div>
</body>
</html>

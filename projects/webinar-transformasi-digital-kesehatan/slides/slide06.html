<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: #1E5128;
  padding: 10pt 40pt;
}
h1 {
  color: #ffffff;
  font-size: 20pt;
  font-weight: bold;
  margin: 0;
}
.content {
  flex: 1;
  display: flex;
  padding: 8pt 40pt 80pt 40pt;
  gap: 15pt;
}
.text-column {
  flex: 0 0 45%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
h2 {
  color: #2C3E50;
  font-size: 14pt;
  font-weight: bold;
  margin: 0 0 10pt 0;
}
ul {
  margin: 0;
  padding-left: 15pt;
  color: #2C3E50;
  font-size: 10pt;
  line-height: 1.3;
}
.chart-column {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.chart-placeholder {
  width: 100%;
  height: 100%;
  min-height: 240pt;
  background: #ECF0F1;
  border-radius: 10pt;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 15pt;
}
</style>
</head>
<body>
  <div class="header">
    <h1>Bukti Keberlanjutan: Program 2025-2026</h1>
  </div>
  <div class="content">
    <div class="text-column">
      <h2>Program Konkret yang Tetap Berjalan</h2>
      <ul>
        <li>Program Cek Kesehatan Gratis</li>
        <li>Skrining BPJS Kesehatan digital via Mobile JKN</li>
        <li>SATUSEHAT Rujukan + SIRANAP (geotagging)</li>
        <li>Siskohatkes Haji 2026 terintegrasi SATUSEHAT</li>
      </ul>
    </div>
    <div class="chart-column">
      <div id="programChart" class="chart-placeholder"></div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: #1E5128;
  padding: 20pt 40pt;
}
h1 {
  color: #ffffff;
  font-size: 32pt;
  font-weight: bold;
  margin: 0;
}
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30pt 40pt;
  gap: 25pt;
}
.transformation-image {
  width: 100%;
  max-width: 650pt;
  height: auto;
}
.description {
  text-align: center;
  color: #2C3E50;
  font-size: 16pt;
  font-style: italic;
  margin: 0;
}
</style>
</head>
<body>
  <div class="header">
    <h1>Evolusi Strategi: Dari Menghubungkan ke Memanfaatkan</h1>
  </div>
  <div class="content">
    <img src="../assets/transformation-arrow.png" alt="Transformation Arrow" class="transformation-image"/>
    <p class="description">Transformasi strategis dari CONNECTIVITY ke CAPABILITY</p>
  </div>
</body>
</html>

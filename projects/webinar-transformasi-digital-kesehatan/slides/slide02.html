<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: #1E5128;
  padding: 10pt 40pt;
}
h1 {
  color: #ffffff;
  font-size: 24pt;
  font-weight: bold;
  margin: 0;
}
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 8pt 40pt 70pt 40pt;
}
.question-card {
  display: flex;
  align-items: center;
  gap: 8pt;
  background: #ECF0F1;
  padding: 4pt 8pt;
  border-radius: 6pt;
  border-left: 4pt solid #4E9F3D;
  margin-bottom: 4pt;
}
.question-card:last-child {
  margin-bottom: 0;
}
.question-number {
  font-size: 26pt;
  font-weight: bold;
  color: #4E9F3D;
  min-width: 30pt;
}
.question-text {
  color: #2C3E50;
  font-size: 12pt;
  font-weight: bold;
}
</style>
</head>
<body>
  <div class="header">
    <h1>Roadmap Presentasi</h1>
  </div>
  <div class="content">
    <div class="question-card">
      <p class="question-number">1</p>
      <p class="question-text">Apa yang telah tercapai dan berubah?</p>
    </div>
    <div class="question-card">
      <p class="question-number">2</p>
      <p class="question-text">Tantangan apa yang menghadang?</p>
    </div>
    <div class="question-card">
      <p class="question-number">3</p>
      <p class="question-text">Bagaimana melangkah ke depan?</p>
    </div>
  </div>
</body>
</html>

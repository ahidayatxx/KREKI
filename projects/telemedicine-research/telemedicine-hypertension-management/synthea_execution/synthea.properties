# --- Synthea Configuration for Hypertension Pilot Study ---

# For more information, see:
# https://github.com/synthetichealth/synthea/wiki/Common-Configuration

# Set the output format to CSV for easy analysis
exporter.csv.export = true
# All other formats can be disabled for this pilot.
exporter.fhir.export = false
exporter.ccda.export = false
exporter-fhir_stu3.export = false
exporter.fhir_dstu2.export = false

# Set a specific output directory for this pilot study
exporter.baseDirectory = ./output/hypertension_pilot_study

# Set the duration of patient history to generate (e.g., 5 years for more data)
exporter.years_of_history = 5

# Ensure essential data for the study is generated
generate.vital_signs = true
generate.observations = true
generate.medications = true
generate.conditions = true
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Health Competency & Masterclass</title>

    <!-- Google Fonts: Inter & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                fontFamily: {
                    sans: ['Inter', 'sans-serif'],
                    display: ['Plus Jakarta Sans', 'sans-serif'],
                },
                extend: {
                    colors: {
                        slate: {
                            850: '#151f32',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- SHA-256 for simple password hash (works on file:// protocol) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.9.0/sha256.min.js"></script>

    <!-- Mobile Performance CSS -->
    <style>
        * {
            touch-action: manipulation;
        }

        button,
        a {
            touch-action: manipulation;
            min-height: 44px;
        }

        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icon Components
        const IconBase = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const MenuIcon = () => (
            <IconBase>
                <line x1="4" x2="20" y1="12" y2="12" />
                <line x1="4" x2="20" y1="6" y2="6" />
                <line x1="4" x2="20" y1="18" y2="18" />
            </IconBase>
        );

        const XIcon = () => (
            <IconBase>
                <path d="M18 6 6 18" />
                <path d="m6 6 12 12" />
            </IconBase>
        );

        const LayersIcon = () => (
            <IconBase>
                <path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z" />
                <path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65" />
                <path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65" />
            </IconBase>
        );

        const GraduationCapIcon = () => (
            <IconBase>
                <path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z" />
                <path d="M22 10v6" />
                <path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5" />
            </IconBase>
        );

        const ArrowRightIcon = () => (
            <IconBase>
                <path d="M5 12h14" />
                <path d="m12 5 7 7-7 7" />
            </IconBase>
        );

        // Lock Icon for password overlay
        const LockIcon = () => (
            <IconBase>
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </IconBase>
        );

        // Note: Using global sha256() from the included script for compatibility with file:// protocol
        // crypto.subtle requires a Secure Context (HTTPS or localhost) which fails on file://

        // Password Overlay Component
        const PasswordOverlay = ({ password, setPassword, handleSubmit, error, isLoading }) => (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-[#020617] px-6">
                {/* Background Gradients */}
                <div className="absolute inset-0 pointer-events-none overflow-hidden">
                    <div className="absolute top-0 left-1/4 w-96 h-96 bg-blue-500/20 rounded-full blur-[100px] animate-pulse"></div>
                    <div className="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-500/20 rounded-full blur-[100px] animate-pulse" style={{ animationDelay: '1s' }}></div>
                    <div className="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20 brightness-100 contrast-150"></div>
                </div>

                {/* Password Form */}
                <div className="relative z-10 w-full max-w-md perspective-1000">
                    <div className="bg-slate-900/60 backdrop-blur-2xl border border-white/10 rounded-3xl p-8 shadow-2xl ring-1 ring-white/5 transform transition-all duration-500 hover:scale-[1.01]">
                        {/* Icon */}
                        <div className="w-20 h-20 rounded-2xl bg-gradient-to-br from-slate-800 to-slate-900 flex items-center justify-center mb-8 mx-auto border border-white/10 shadow-lg group">
                            <LockIcon className="w-10 h-10 text-blue-400 group-hover:text-blue-300 transition-colors duration-300" />
                        </div>

                        {/* Heading */}
                        <h2 className="text-3xl font-display font-bold text-white text-center mb-3 tracking-tight">
                            Restricted Access
                        </h2>
                        <p className="text-slate-400 text-center mb-8 font-medium">
                            Enter credentials to access competency framework
                        </p>

                        {/* Form */}
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div className="relative group">
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="Enter access code..."
                                    className="w-full px-5 py-4 bg-slate-950/50 border border-slate-700/50 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all font-sans text-lg tracking-wide group-hover:border-slate-600"
                                    autoFocus
                                    disabled={isLoading}
                                />
                            </div>

                            {error && (
                                <div className="p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm text-center animate-fade-in font-medium">
                                    {error}
                                </div>
                            )}

                            <button
                                type="submit"
                                disabled={isLoading}
                                className="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold rounded-xl transition-all duration-300 transform hover:-translate-y-0.5 hover:shadow-lg hover:shadow-blue-500/25 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                            >
                                {isLoading ? (
                                    <span className="flex items-center justify-center gap-2">
                                        <svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                        </svg>
                                        Verifying...
                                    </span>
                                ) : (
                                    'Unlock Access'
                                )}
                            </button>
                        </form>

                        {/* Security Note */}
                        <p className="text-slate-600 text-xs text-center mt-8 font-medium">
                            Authorized Personnel Only &bull; Secure Environment
                        </p>
                    </div>
                </div>
            </div>
        );

        // Main App Component
        const App = () => {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            // Check sessionStorage on mount
            useEffect(() => {
                const auth = sessionStorage.getItem('auth');
                if (auth === 'true') setIsAuthenticated(true);

                // Initialize lucide icons after React renders
                if (window.lucide) window.lucide.createIcons();
            }, []);

            const handleSubmit = (e) => {
                e.preventDefault();
                setError('');
                setIsLoading(true);

                // Small delay to show loading state
                setTimeout(() => {
                    // Use synchronous sha256 from the library
                    const hash = sha256(password);

                    // Hash for 'DHCF3Tiers'
                    if (hash === '7f82c5596aa962fc69d72d80072e33792f09d5a17e643455960becf53754ab75') {
                        setIsAuthenticated(true);
                        sessionStorage.setItem('auth', 'true');
                        // Update all links to include auth hash
                        document.querySelectorAll('a[href$=".html"]').forEach(link => {
                            const href = link.getAttribute('href');
                            if (href) link.setAttribute('href', href + '#auth=true');
                        });
                        setIsLoading(false);
                    } else {
                        setError('Access Denied: Invalid Credentials');
                        setPassword('');
                        setIsLoading(false);
                    }
                }, 800);
            };

            const handleLogout = () => {
                sessionStorage.removeItem('auth');
                setIsAuthenticated(false);
                setPassword('');
            };

            // Show password overlay if not authenticated
            if (!isAuthenticated) {
                return <PasswordOverlay
                    password={password}
                    setPassword={setPassword}
                    handleSubmit={handleSubmit}
                    error={error}
                    isLoading={isLoading}
                />;
            }

            return (
                <div className="bg-[#020617] text-slate-100 antialiased min-h-screen flex flex-col items-center justify-center relative selection:bg-blue-500/30 selection:text-blue-200 overflow-x-hidden">
                    {/* Fixed Header with Mobile Menu */}
                    <header className="fixed top-0 left-0 right-0 z-50 px-6 py-4 bg-black/20 backdrop-blur-xl border-b border-white/10">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <h1 className="text-xl font-bold text-white">Digital Health Competency</h1>

                            <div className="flex items-center gap-4">
                                <button
                                    onClick={handleLogout}
                                    className="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-white/10 transition-all flex items-center gap-2"
                                    title="Lock Session"
                                >
                                    <LockIcon className="w-5 h-5" />
                                    <span className="hidden md:inline text-sm font-medium">Lock</span>
                                </button>

                                {/* Hamburger button - mobile only */}
                                <button
                                    onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                                    className="md:hidden p-2.5 text-white hover:text-emerald-400 transition-colors"
                                    aria-label="Toggle menu"
                                >
                                    {isMobileMenuOpen ? <XIcon /> : <MenuIcon />}
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Mobile dropdown menu */}
                    {isMobileMenuOpen && (
                        <div className="fixed top-[72px] left-0 right-0 z-40 bg-black/90 backdrop-blur-xl border-b border-white/10 md:hidden">
                            <nav className="px-6 py-4 space-y-2">
                                <a
                                    href="3-Tiers-Competency-Framework.html"
                                    onClick={() => setIsMobileMenuOpen(false)}
                                    className="block w-full text-left px-4 py-3 text-white hover:text-emerald-400 hover:bg-white/5 rounded-lg transition-all min-h-[44px] flex items-center"
                                >
                                    Competency Framework
                                </a>
                                <a
                                    href="digital-health-cb-masterclass-v2.html"
                                    onClick={() => setIsMobileMenuOpen(false)}
                                    className="block w-full text-left px-4 py-3 text-white hover:text-emerald-400 hover:bg-white/5 rounded-lg transition-all min-h-[44px] flex items-center"
                                >
                                    Masterclass Courses
                                </a>
                            </nav>
                        </div>
                    )}

                    {/* Background Gradients */}
                    <div className="absolute inset-0 pointer-events-none">
                        <div className="absolute top-0 left-1/4 w-96 h-96 bg-blue-500/10 rounded-full blur-[100px]"></div>
                        <div className="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-[100px]"></div>
                        <div className="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20 brightness-100 contrast-150"></div>
                    </div>

                    {/* Main Content - with top padding for fixed header */}
                    <main className="relative z-10 w-full max-w-5xl px-6 py-12 pt-24 animate-fade-in">

                        <div className="text-center mb-16 space-y-6">
                            <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-800/50 border border-slate-700/50 text-xs font-medium text-slate-400 backdrop-blur-sm">
                                <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                Digital Health Education
                            </div>

                            <h1 className="text-5xl md:text-7xl font-display font-bold tracking-tight text-white">
                                Digital Health <br />
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400">Competency & Learning</span>
                            </h1>

                            <p className="text-lg text-slate-400 max-w-2xl mx-auto leading-relaxed">
                                Explore the comprehensive competency framework or enroll in our specialized masterclass courses delivered by Monash University.
                            </p>
                        </div>

                        <div className="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto">

                            {/* Card 1: Framework */}
                            <a href="3-Tiers-Competency-Framework.html" className="group relative bg-slate-900/50 hover:bg-slate-800/60 border border-slate-800 hover:border-slate-700 p-8 rounded-3xl transition-all duration-300 hover:-translate-y-1 hover:shadow-2xl hover:shadow-blue-500/10 flex flex-col h-full">
                                <div className="absolute inset-0 bg-gradient-to-br from-blue-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity rounded-3xl"></div>

                                <div className="relative z-10 flex flex-col h-full">
                                    <div className="w-14 h-14 rounded-2xl bg-slate-800 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300 border border-slate-700 group-hover:border-blue-500/30 group-hover:bg-blue-500/10">
                                        <LayersIcon className="w-7 h-7 text-blue-400" />
                                    </div>

                                    <h2 className="text-2xl font-display font-bold text-white mb-3">Competency Framework</h2>
                                    <p className="text-slate-400 leading-relaxed mb-8 flex-grow">
                                        Explore the 3-tier framework defining essential skills, knowledge, and capabilities for the digital health workforce.
                                    </p>

                                    <div className="flex items-center text-blue-400 font-medium group-hover:translate-x-2 transition-transform">
                                        Explore Framework <ArrowRightIcon className="w-4 h-4 ml-2" />
                                    </div>
                                </div>
                            </a>

                            {/* Card 2: Masterclass */}
                            <a href="digital-health-cb-masterclass-v2.html" className="group relative bg-slate-900/50 hover:bg-slate-800/60 border border-slate-800 hover:border-slate-700 p-8 rounded-3xl transition-all duration-300 hover:-translate-y-1 hover:shadow-2xl hover:shadow-purple-500/10 flex flex-col h-full">
                                <div className="absolute inset-0 bg-gradient-to-br from-purple-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity rounded-3xl"></div>

                                <div className="relative z-10 flex flex-col h-full">
                                    <div className="w-14 h-14 rounded-2xl bg-slate-800 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300 border border-slate-700 group-hover:border-purple-500/30 group-hover:bg-purple-500/10">
                                        <GraduationCapIcon className="w-7 h-7 text-purple-400" />
                                    </div>

                                    <h2 className="text-2xl font-display font-bold text-white mb-3">Masterclass Course</h2>
                                    <p className="text-slate-400 leading-relaxed mb-8 flex-grow">
                                        Enroll in specialized courses designed to elevate healthcare professionals from foundational literacy to leadership.
                                    </p>

                                    <div className="flex items-center text-purple-400 font-medium group-hover:translate-x-2 transition-transform">
                                        View Courses <ArrowRightIcon className="w-4 h-4 ml-2" />
                                    </div>
                                </div>
                            </a>

                        </div>

                        <footer className="mt-20 text-center border-t border-slate-800/50 pt-8">
                            <p className="text-slate-500 text-sm">
                                Technical Working Group SATUSEHAT &bull; Faculty of IT at Monash University
                            </p>
                        </footer>

                    </main>
                </div>
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>

<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="900" fill="#f8f9fa"/>
  
  <!-- Header -->
  <rect width="1200" height="80" fill="#2c3e50"/>
  <text x="40" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">ER Dashboard - RSUD Jakarta Pusat</text>
  <text x="40" y="60" font-family="Arial, sans-serif" font-size="14" fill="#bdc3c7">Real-time Emergency Room Operations Monitor</text>
  
  <!-- Current Time and Status -->
  <rect x="900" y="20" width="280" height="40" fill="#34495e" rx="5"/>
  <text x="920" y="35" font-family="Arial, sans-serif" font-size="12" fill="white">Last Updated:</text>
  <text x="920" y="50" font-family="Arial, sans-serif" font-size="12" fill="#2ecc71">2025-01-25 14:32:15 WIB</text>
  <circle cx="1150" cy="40" r="8" fill="#2ecc71"/>
  <text x="1165" y="45" font-family="Arial, sans-serif" font-size="12" fill="white">LIVE</text>
  
  <!-- Main Content Area -->
  <!-- Time Metrics Section -->
  <rect x="20" y="100" width="580" height="300" fill="white" stroke="#e0e6ed" stroke-width="1" rx="8"/>
  <text x="40" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">⏱️ Time Metrics</text>
  
  <!-- Door-to-Triage -->
  <rect x="40" y="150" width="260" height="60" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="5"/>
  <text x="50" y="170" font-family="Arial, sans-serif" font-size="12" fill="#2e7d32">Door-to-Triage</text>
  <text x="50" y="190" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2e7d32">3.2 min</text>
  <text x="50" y="205" font-family="Arial, sans-serif" font-size="11" fill="#4caf50">✓ Compliant (≤5 min)</text>
  
  <!-- Door-to-Doctor -->
  <rect x="320" y="150" width="260" height="60" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
  <text x="330" y="170" font-family="Arial, sans-serif" font-size="12" fill="#e65100">Door-to-Doctor</text>
  <text x="330" y="190" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#e65100">18 min</text>
  <text x="330" y="205" font-family="Arial, sans-serif" font-size="11" fill="#ff9800">⚠ Above Target (15 min)</text>
  
  <!-- Average LOS -->
  <rect x="40" y="225" width="260" height="60" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" rx="5"/>
  <text x="50" y="245" font-family="Arial, sans-serif" font-size="12" fill="#1565c0">Average Length of Stay</text>
  <text x="50" y="265" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1565c0">2h 45m</text>
  <text x="50" y="280" font-family="Arial, sans-serif" font-size="11" fill="#2196f3">ℹ Within Range</text>
  
  <!-- Triage Compliance -->
  <rect x="320" y="225" width="260" height="60" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="5"/>
  <text x="330" y="245" font-family="Arial, sans-serif" font-size="12" fill="#2e7d32">Triage Compliance</text>
  <text x="330" y="265" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2e7d32">92%</text>
  <text x="330" y="280" font-family="Arial, sans-serif" font-size="11" fill="#4caf50">Target: 95%</text>
  
  <!-- Compliance Progress Bar -->
  <rect x="40" y="300" width="540" height="20" fill="#f5f5f5" stroke="#ddd" rx="10"/>
  <rect x="40" y="300" width="497" height="20" fill="#4caf50" rx="10"/>
  <text x="320" y="315" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">Triage Compliance: 92%</text>
  <text x="40" y="340" font-family="Arial, sans-serif" font-size="10" fill="#666">Target: 95%</text>
  <text x="580" y="340" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="end">100%</text>
  
  <!-- Capacity Section -->
  <rect x="620" y="100" width="560" height="300" fill="white" stroke="#e0e6ed" stroke-width="1" rx="8"/>
  <text x="640" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">🏥 ER Capacity</text>
  
  <!-- Current Occupancy -->
  <rect x="640" y="150" width="180" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
  <text x="650" y="170" font-family="Arial, sans-serif" font-size="12" fill="#e65100">Current Occupancy</text>
  <text x="650" y="195" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#e65100">23/30</text>
  <text x="650" y="215" font-family="Arial, sans-serif" font-size="12" fill="#ff9800">Beds Occupied</text>
  <text x="650" y="235" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff9800">77% Utilization</text>
  
  <!-- Available Beds -->
  <rect x="840" y="150" width="160" height="100" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="5"/>
  <text x="850" y="170" font-family="Arial, sans-serif" font-size="12" fill="#2e7d32">Available Beds</text>
  <text x="850" y="205" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#2e7d32">7</text>
  <text x="850" y="225" font-family="Arial, sans-serif" font-size="12" fill="#4caf50">Ready for Patients</text>
  
  <!-- Status Indicator -->
  <rect x="1020" y="150" width="140" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
  <text x="1030" y="170" font-family="Arial, sans-serif" font-size="12" fill="#e65100">Status</text>
  <circle cx="1090" cy="190" r="20" fill="#ff9800"/>
  <text x="1090" y="195" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="white">!</text>
  <text x="1030" y="220" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff9800">BUSY</text>
  <text x="1030" y="235" font-family="Arial, sans-serif" font-size="10" fill="#e65100">Monitor Closely</text>
  
  <!-- Bed Types Breakdown -->
  <text x="640" y="275" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Bed Distribution:</text>
  
  <!-- General Beds -->
  <rect x="640" y="285" width="120" height="30" fill="#e3f2fd" stroke="#2196f3" rx="3"/>
  <text x="650" y="300" font-family="Arial, sans-serif" font-size="11" fill="#1565c0">General: 16/20</text>
  
  <!-- Trauma Beds -->
  <rect x="770" y="285" width="120" height="30" fill="#ffebee" stroke="#f44336" rx="3"/>
  <text x="780" y="300" font-family="Arial, sans-serif" font-size="11" fill="#c62828">Trauma: 4/6</text>
  
  <!-- Isolation Beds -->
  <rect x="900" y="285" width="120" height="30" fill="#fce4ec" stroke="#e91e63" rx="3"/>
  <text x="910" y="300" font-family="Arial, sans-serif" font-size="11" fill="#ad1457">Isolation: 3/4</text>
  
  <!-- Patient Flow Visualization -->
  <rect x="20" y="420" width="1160" height="200" fill="white" stroke="#e0e6ed" stroke-width="1" rx="8"/>
  <text x="40" y="450" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">📊 Patient Flow (Last 24 Hours)</text>
  
  <!-- Flow Metrics -->
  <rect x="40" y="465" width="200" height="50" fill="#e8f5e9" stroke="#4caf50" rx="5"/>
  <text x="50" y="480" font-family="Arial, sans-serif" font-size="12" fill="#2e7d32">Arrivals</text>
  <text x="50" y="500" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2e7d32">8/hr ↗</text>
  
  <rect x="260" y="465" width="200" height="50" fill="#e3f2fd" stroke="#2196f3" rx="5"/>
  <text x="270" y="480" font-family="Arial, sans-serif" font-size="12" fill="#1565c0">Discharges</text>
  <text x="270" y="500" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1565c0">6/hr →</text>
  
  <rect x="480" y="465" width="200" height="50" fill="#fff3e0" stroke="#ff9800" rx="5"/>
  <text x="490" y="480" font-family="Arial, sans-serif" font-size="12" fill="#e65100">Net Flow</text>
  <text x="490" y="500" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e65100">+2/hr</text>
  
  <!-- Simple Flow Chart -->
  <g transform="translate(720, 470)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#666">24hr Trend:</text>
    <!-- Hour markers -->
    <line x1="0" y1="20" x2="400" y2="20" stroke="#ddd" stroke-width="1"/>
    <line x1="0" y1="20" x2="0" y2="120" stroke="#ddd" stroke-width="1"/>
    
    <!-- Arrival trend line -->
    <polyline points="0,100 50,95 100,85 150,75 200,70 250,60 300,65 350,70 400,75" 
              stroke="#4caf50" stroke-width="3" fill="none"/>
    
    <!-- Discharge trend line -->
    <polyline points="0,110 50,105 100,100 150,95 200,90 250,85 300,80 350,85 400,90" 
              stroke="#2196f3" stroke-width="3" fill="none"/>
    
    <!-- Legend -->
    <line x1="0" y1="140" x2="20" y2="140" stroke="#4caf50" stroke-width="3"/>
    <text x="25" y="145" font-family="Arial, sans-serif" font-size="10" fill="#4caf50">Arrivals</text>
    <line x1="80" y1="140" x2="100" y2="140" stroke="#2196f3" stroke-width="3"/>
    <text x="105" y="145" font-family="Arial, sans-serif" font-size="10" fill="#2196f3">Discharges</text>
  </g>
  
  <!-- Current Patients Queue -->
  <rect x="20" y="640" width="1160" height="140" fill="white" stroke="#e0e6ed" stroke-width="1" rx="8"/>
  <text x="40" y="670" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">👥 Current Patient Queue</text>
  
  <!-- Triage Level 1 -->
  <rect x="40" y="685" width="220" height="80" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
  <text x="50" y="705" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c62828">🔴 Triage Level 1 (Critical)</text>
  <text x="50" y="725" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#c62828">1 patient</text>
  <text x="50" y="745" font-family="Arial, sans-serif" font-size="12" fill="#f44336">Wait Time: 0 min</text>
  <text x="50" y="760" font-family="Arial, sans-serif" font-size="11" fill="#c62828">Status: Being Treated</text>
  
  <!-- Triage Level 2 -->
  <rect x="280" y="685" width="220" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
  <text x="290" y="705" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e65100">🟡 Triage Level 2 (Urgent)</text>
  <text x="290" y="725" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#e65100">3 patients</text>
  <text x="290" y="745" font-family="Arial, sans-serif" font-size="12" fill="#ff9800">Avg Wait: 12 min</text>
  <text x="290" y="760" font-family="Arial, sans-serif" font-size="11" fill="#e65100">Next: 8 min remaining</text>
  
  <!-- Triage Level 3 -->
  <rect x="520" y="685" width="220" height="80" fill="#fff8e1" stroke="#ffc107" stroke-width="2" rx="5"/>
  <text x="530" y="705" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f57c00">🟠 Triage Level 3 (Less Urgent)</text>
  <text x="530" y="725" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f57c00">8 patients</text>
  <text x="530" y="745" font-family="Arial, sans-serif" font-size="12" fill="#ffc107">Avg Wait: 25 min</text>
  <text x="530" y="760" font-family="Arial, sans-serif" font-size="11" fill="#f57c00">Queue length: High</text>
  
  <!-- Triage Level 4 -->
  <rect x="760" y="685" width="200" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
  <text x="770" y="705" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7b1fa2">🟣 Triage Level 4</text>
  <text x="770" y="725" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#7b1fa2">6 patients</text>
  <text x="770" y="745" font-family="Arial, sans-serif" font-size="12" fill="#9c27b0">Avg Wait: 45 min</text>
  <text x="770" y="760" font-family="Arial, sans-serif" font-size="11" fill="#7b1fa2">Standard wait</text>
  
  <!-- Triage Level 5 -->
  <rect x="980" y="685" width="200" height="80" fill="#e8eaf6" stroke="#3f51b5" stroke-width="2" rx="5"/>
  <text x="990" y="705" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#303f9f">🔵 Triage Level 5</text>
  <text x="990" y="725" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#303f9f">5 patients</text>
  <text x="990" y="745" font-family="Arial, sans-serif" font-size="12" fill="#3f51b5">Avg Wait: 60 min</text>
  <text x="990" y="760" font-family="Arial, sans-serif" font-size="11" fill="#303f9f">Non-urgent cases</text>
  
  <!-- Footer with System Info -->
  <rect x="0" y="800" width="1200" height="100" fill="#34495e"/>
  <text x="40" y="830" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">System Status:</text>
  <circle cx="140" cy="825" r="5" fill="#2ecc71"/>
  <text x="155" y="830" font-family="Arial, sans-serif" font-size="12" fill="#2ecc71">All Systems Operational</text>
  
  <text x="40" y="850" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">Data Source: FHIR ER Workflow System | Update Frequency: Real-time (5s)</text>
  <text x="40" y="870" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">Emergency Contacts: IT Support (ext. 2510) | Charge Nurse (ext. 2301)</text>
  
  <!-- Alert Badge -->
  <rect x="900" y="810" width="280" height="60" fill="#e74c3c" rx="5"/>
  <text x="920" y="830" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">⚠ ACTIVE ALERT</text>
  <text x="920" y="850" font-family="Arial, sans-serif" font-size="11" fill="white">Door-to-Doctor time exceeding target</text>
  <text x="920" y="865" font-family="Arial, sans-serif" font-size="11" fill="white">3 patients waiting >15 minutes</text>
</svg>
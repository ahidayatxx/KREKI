<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infografis Interaktif: DIM Raperda Kesehatan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
          colors: {
            soft: {
              bg: '#fdfcf8',
              surface: 'rgba(255, 255, 255, 0.6)',
              glass: 'rgba(255, 255, 255, 0.75)',
              primary: '#8b5cf6', // Soft Violet
              secondary: '#10b981', // Soft Emerald
              accent: '#f472b6', // Soft Pink
              text: '#475569',
              muted: '#94a3b8'
            }
          },
          boxShadow: {
            'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
            'float': '0 20px 40px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01)',
            'glow': '0 0 15px rgba(139, 92, 246, 0.3)'
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #fdfcf8;
      background-image:
        radial-gradient(at 0% 0%, rgba(221, 214, 254, 0.3) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(209, 250, 229, 0.3) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(254, 215, 170, 0.3) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(186, 230, 253, 0.3) 0px, transparent 50%);
      background-attachment: fixed;
    }

    /* Glassmorphism Utilities */
    .glass-panel {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    /* Custom Scrollbar */
    .custom-scroll::-webkit-scrollbar {
      width: 5px;
    }

    .custom-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scroll::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.5);
      border-radius: 10px;
    }

    .custom-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(100, 116, 139, 0.7);
    }

    /* Animations */
    .node-enter {
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(10px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .float-animation {
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-5px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    /* Connecting Lines usually SVG, but here using divs, lets make them softer */
    .connector-line {
      transition: height 0.3s ease;
    }

    /* Drag cursor */
    .cursor-grab {
      cursor: grab;
    }

    .cursor-grabbing {
      cursor: grabbing;
    }

    /* Hide selection */
    .no-select {
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
</head>

<body
  class="h-screen w-screen overflow-hidden text-soft-text relative selection:bg-violet-100 selection:text-violet-700">

  <!-- CANVAS AREA -->
  <div id="canvas-container" class="absolute inset-0 z-0 overflow-hidden cursor-grab no-select">

    <!-- Transformable Layer -->
    <div id="mindmap-layer"
      class="absolute top-0 left-0 min-w-full min-h-full origin-top-center transition-transform duration-200 ease-out flex justify-center pt-24 pb-48">
      <!-- Dynamic Content -->
    </div>
  </div>

  <!-- UI: Floating Header/Toolbar -->
  <div class="absolute top-6 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-4">
    <div
      class="glass-panel px-6 py-3 rounded-full shadow-glass flex items-center gap-4 transition-all hover:shadow-float">
      <h1 class="text-sm font-bold bg-gradient-to-r from-violet-600 to-emerald-500 bg-clip-text text-transparent">
        DIM Raperda Depok
      </h1>
      <div class="w-px h-4 bg-slate-300/50"></div>
      <div class="flex items-center gap-1">
        <button onclick="zoom(-0.1)"
          class="p-1.5 hover:bg-white/50 rounded-full text-slate-500 hover:text-violet-600 transition-colors"
          title="Perkecil">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <button onclick="resetView()"
          class="p-1.5 hover:bg-white/50 rounded-full text-slate-500 hover:text-violet-600 transition-colors"
          title="Reset">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
        <button onclick="zoom(0.1)"
          class="p-1.5 hover:bg-white/50 rounded-full text-slate-500 hover:text-violet-600 transition-colors"
          title="Perbesar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- UI: Floating Detail Panel (Right) -->
  <div id="detail-panel"
    class="absolute top-6 bottom-6 right-6 w-96 glass-panel rounded-3xl shadow-glass flex flex-col transform translate-x-[120%] transition-transform duration-500 cubic-bezier(0.34, 1.56, 0.64, 1) z-40">
    <!-- Close Button (Absolute on panel) -->
    <button onclick="closePanel()"
      class="absolute top-4 right-4 p-2 bg-white/50 hover:bg-red-50 text-slate-400 hover:text-red-400 rounded-full transition-colors z-10">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <!-- Header -->
    <div class="px-8 pt-8 pb-4 border-b border-white/50 bg-white/20">
      <div id="panel-icon" class="mb-4 inline-flex p-3 rounded-2xl bg-white shadow-sm text-violet-500">
        <!-- Icon injected -->
      </div>
      <h2 id="panel-title" class="text-xl font-bold text-slate-800 leading-tight">Detail Topik</h2>
      <!-- Breadcrumbs or Type -->
      <span id="panel-badge"
        class="mt-2 inline-block px-2.5 py-0.5 rounded-full text-[10px] uppercase tracking-wider font-bold bg-slate-100 text-slate-500">Kategori</span>
    </div>

    <!-- Content -->
    <div id="panel-content" class="flex-1 overflow-y-auto custom-scroll p-8 space-y-6">
      <!-- Dynamic Content -->
    </div>

    <!-- Footer -->
    <div class="p-4 text-center text-[10px] text-slate-400 border-t border-white/50 bg-white/10 rounded-b-3xl">
      Raperda Kota Depok &bull; UU 17/2023 &bull; PP 28/2024
    </div>
  </div>

  <!-- Overlay hint for navigation -->
  <div class="absolute bottom-6 left-6 pointer-events-none opacity-50">
    <p class="text-xs font-medium text-slate-500">
      <span class="bg-white/50 px-2 py-1 rounded-md shadow-sm">Drag</span> untuk geser &bull; <span
        class="bg-white/50 px-2 py-1 rounded-md shadow-sm">Scroll</span> untuk zoom
    </p>
  </div>

  <script>
    // --- DATA ---
    const mindMapData = {
      id: 'root',
      label: 'Tanggung Jawab Pemda',
      type: 'root',
      iconName: 'book-open',
      description: 'Peta Struktur Materi Muatan Raperda Kesehatan Kota Depok.',
      children: [
        {
          id: 'ukp_ukm',
          label: 'Upaya Kesehatan',
          type: 'category',
          iconName: 'activity',
          description: 'Penyelenggaraan upaya kesehatan perseorangan dan masyarakat.',
          children: [
            {
              id: 'umum',
              label: 'Umum & Akses',
              type: 'leaf',
              content: {
                uu: 'UU 17/2023 Pasal 6(1), 7(1): Bertanggung jawab merencanakan, mengatur, membina, dan mengawasi upaya kesehatan yang bermutu.',
                pp: 'PP 28/2024 Pasal 2(1): Pembinaan & pengawasan serta perencanaan kebutuhan Fasyankes.'
              }
            },
            {
              id: 'primer',
              label: 'Primer (Puskesmas)',
              type: 'leaf',
              content: {
                uu: 'UU 17/2023 Pasal 28: Wajib menyediakan akses Pelayanan Kesehatan Primer di seluruh wilayah.',
                pp: 'PP 28/2024 Pasal 803: Mendirikan minimal satu Puskesmas di setiap kecamatan.'
              }
            },
            {
              id: 'lanjutan',
              label: 'Lanjutan (RS)',
              type: 'leaf',
              content: {
                uu: 'UU 17/2023 Pasal 30: Menyediakan Pelayanan Kesehatan Lanjutan (Rumah Sakit).',
                pp: 'PP 28/2024 Pasal 811: Menyediakan RS berdasarkan kebutuhan & menjamin pembiayaan orang miskin.'
              }
            },
            {
              id: 'siklus',
              label: 'Siklus Hidup',
              type: 'category',
              children: [
                { id: 'kia', label: 'Ibu & Anak', type: 'leaf', content: { uu: 'Pasal 40: Yankes Ibu hamil/bersalin.', pp: 'Pasal 13: Rujukan maternal.' } },
                { id: 'lansia', label: 'Lansia', type: 'leaf', content: { uu: 'Pasal 52: Yankes Geriatri.', pp: 'Pasal 79: Long term care.' } }
              ]
            }
          ]
        },
        {
          id: 'p2p_ling',
          label: 'Penyakit & Lingkungan',
          type: 'category',
          iconName: 'shield',
          description: 'Pengendalian penyakit dan kesehatan lingkungan.',
          children: [
            { id: 'p2p', label: 'Pencagahan Penyakit', type: 'leaf', content: { uu: 'Pasal 86: Menular & Tidak Menular.', pp: 'Pasal 193: Kawasan Pangan Sehat.' } },
            { id: 'kesling', label: 'Kesehatan Lingkungan', type: 'leaf', content: { uu: 'Pasal 9: Lingkungan Sehat.', pp: 'Pasal 249: Baku mutu kesling.' } },
            { id: 'ktr', label: 'KTR', type: 'leaf', content: { uu: 'Pasal 151: Penetapan KTR.', pp: 'Pasal 443: Perda KTR.' } }
          ]
        },
        {
          id: 'sdmk',
          label: 'SDM Kesehatan',
          type: 'category',
          iconName: 'users',
          description: 'Manajemen Tenaga Medis dan Kesehatan.',
          children: [
            { id: 'plan', label: 'Perencanaan', type: 'leaf', content: { uu: 'Pasal 10: Pemerataan SDM.', pp: 'Pasal 568: Dokumen perencanaan.' } },
            { id: 'mutu', label: 'Kompetensi', type: 'leaf', content: { uu: 'Pasal 12: Pelatihan.', pp: 'Pasal 544: Izin Praktik.' } }
          ]
        },
        {
          id: 'manajemen',
          label: 'Manajemen',
          type: 'category',
          iconName: 'settings',
          children: [
            { id: 'dana', label: 'Pendanaan', type: 'leaf', content: { uu: 'Pasal 403: Anggaran Kesehatan.', pp: 'Pasal 1125: Berbasis Kinerja.' } },
            { id: 'masyarakat', label: 'Peran Masyarakat', type: 'leaf', content: { uu: 'Pasal 14: Pemberdayaan.', pp: 'Pasal 1146: Insentif Kader.' } }
          ]
        }
      ]
    };

    const icons = {
      'book-open': '<svg class="w-full h-full" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>',
      'activity': '<svg class="w-full h-full" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>',
      'users': '<svg class="w-full h-full" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>',
      'shield': '<svg class="w-full h-full" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>',
      'settings': '<svg class="w-full h-full" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>',
      'chevron-down': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>',
      'plus': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>'
    };

    let state = {
      scale: 1,
      pos: { x: 0, y: 0 },
      expanded: { 'root': true, 'ukp_ukm': true, 'p2p_ling': false }, // Initial state
      selected: null
    };

    const canvasContainer = document.getElementById('canvas-container');
    const layer = document.getElementById('mindmap-layer');
    const detailPanel = document.getElementById('detail-panel');

    function init() {
      render();
      // Center roughly
      state.pos.y = 50;
      updateTransform();
    }

    function render() {
      layer.innerHTML = '';
      const treeRoot = createTreeNode(mindMapData, 0);
      layer.appendChild(treeRoot);
      updatePanel();
    }

    function createTreeNode(node, level) {
      const container = document.createElement('div');
      container.className = 'flex flex-col items-center node-enter';
      // Stagger animation based on level
      container.style.animationDelay = `${level * 0.1}s`;

      // Vertical Link from Parent
      if (level > 0) {
        const link = document.createElement('div');
        link.className = 'h-8 w-px bg-slate-200'; // Softer line
        container.appendChild(link);
      }

      // Node Bubble/Card
      const card = document.createElement('div');

      // --- STYLING LOGIC ---
      let baseClasses = "relative z-10 transition-all duration-300 cursor-pointer group select-none flex flex-col items-center justify-center text-center";
      let lookClasses = "";

      if (level === 0) {
        // ROOT
        lookClasses = "w-48 h-48 rounded-full bg-gradient-to-br from-violet-500 to-fuchsia-500 text-white shadow-lg ring-4 ring-white/50 hover:scale-105 hover:shadow-xl hover:ring-white";
      } else if (level === 1) {
        // CATEGORY
        lookClasses = "w-32 h-32 rounded-3xl bg-white border border-white shadow-sm hover:shadow-md hover:-translate-y-1 hover:border-violet-200 text-slate-600";
      } else {
        // LEAF
        lookClasses = "w-auto max-w-[180px] min-w-[120px] px-4 py-3 rounded-2xl bg-white border border-slate-100 shadow-sm hover:shadow-md hover:border-violet-200 text-sm text-slate-500 hover:text-violet-600";
      }

      if (state.selected === node.id) {
        // Active Pulse Effect
        lookClasses += " ring-2 ring-violet-400 ring-offset-2";
        if (level > 0) lookClasses += " bg-violet-50 text-violet-700 border-violet-200";
      }

      card.className = `${baseClasses} ${lookClasses}`;
      card.onclick = (e) => {
        e.stopPropagation();
        if (node.children && node.children.length > 0) {
          // If clicking a category, maybe toggle expand OR select? 
          // Let's do: Select opens panel, Toggle button handles expand.
          // Actually for smooth UX: Toggle if children exist, select if leaf?
          // No, let's keep separate: Click body -> Select/Info. Click Toggle -> Expand.
        }
        selectNode(node);
      };

      // CONTENT
      // 1. Icon (Level 0 & 1 only usually?)
      if (node.iconName && icons[node.iconName] && level < 2) {
        const iconContainer = document.createElement('div');
        iconContainer.className = level === 0 ? "w-10 h-10 mb-2 opacity-90" : "w-8 h-8 mb-2 text-violet-400 p-1.5 bg-violet-50 rounded-xl group-hover:bg-violet-100 transition-colors";
        iconContainer.innerHTML = icons[node.iconName];
        card.appendChild(iconContainer);
      }

      // 2. Label
      const label = document.createElement('span');
      label.className = level === 0 ? "font-bold text-lg leading-tight px-4" : "font-medium leading-tight";
      label.innerText = node.label;
      card.appendChild(label);

      // 3. Toggle Button (Floats at bottom)
      if (node.children && node.children.length > 0) {
        const btn = document.createElement('button');
        const isExpanded = state.expanded[node.id];

        btn.className = `absolute -bottom-3 w-6 h-6 rounded-full flex items-center justify-center shadow-sm border border-slate-100 transition-all hover:scale-110 z-20 ${isExpanded ? 'bg-white text-slate-400 rotate-180' : 'bg-violet-500 text-white'
          }`;
        btn.innerHTML = icons['chevron-down']; // Using Chevron for both, rotating it

        if (!isExpanded) {
          btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`; // Plus
        }

        btn.onclick = (e) => {
          e.stopPropagation();
          toggleExpand(node.id);
        };
        card.appendChild(btn);
      }

      container.appendChild(card);

      // CHILDREN RENDERING
      if (node.children && node.children.length > 0 && state.expanded[node.id]) {
        const childrenWrapper = document.createElement('div');
        childrenWrapper.className = "flex flex-col items-center relative";

        // Vertical line logic handled by children themselves mostly, 
        // but we need a horizontal bridge if multiple children.

        const childrenRow = document.createElement('div');
        childrenRow.className = `flex flex-wrap justify-center gap-6 pt-2 ${level === 0 ? 'gap-12' : ''}`; // Add spacing

        // Horizontal connector bar
        if (node.children.length > 1) {
          const bar = document.createElement('div');
          bar.className = "absolute top-0 h-px bg-slate-200";
          // We need to width calculation, but CSS pseudo-element is harder dynamically.
          // Simple trick: A div with specific width %?
          // Let's span it across children... simpler approach:
          // We just let the vertical lines of children connect to a centralized point?
          // Standard tree usually has a horizontal bar.
          bar.style.width = "calc(100% - 60px)"; // Approximate visual
          bar.style.top = "0px";
          childrenRow.appendChild(bar);
        }

        node.children.forEach(child => {
          childrenRow.appendChild(createTreeNode(child, level + 1));
        });
        childrenWrapper.appendChild(childrenRow);
        container.appendChild(childrenWrapper); // Direct append, children have top padding or vertical line
      }

      return container;
    }

    // --- INTERACTION ---
    function toggleExpand(id) {
      state.expanded[id] = !state.expanded[id];
      render();
    }

    function selectNode(node) {
      state.selected = node.id;
      state.selectedData = node;
      render(); // to update active state

      // Populate Panel
      const title = document.getElementById('panel-title');
      const icon = document.getElementById('panel-icon');
      const badge = document.getElementById('panel-badge');
      const content = document.getElementById('panel-content');

      title.innerText = node.label;

      // Icon
      if (node.iconName && icons[node.iconName]) {
        icon.innerHTML = icons[node.iconName];
        icon.classList.remove('hidden');
      } else {
        icon.innerHTML = icons['book-open']; // default
      }

      // Badge
      badge.innerText = node.type === 'leaf' ? 'Sub-Materi' : (node.type === 'root' ? 'Topik Utama' : 'Kategori');
      badge.className = `mt-2 inline-block px-3 py-1 rounded-full text-[10px] uppercase tracking-wider font-bold ${node.type === 'leaf' ? 'bg-emerald-100 text-emerald-600' : 'bg-violet-100 text-violet-600'
        }`;

      // Content
      content.innerHTML = '';

      if (node.description) {
        const desc = document.createElement('p');
        desc.className = "text-slate-600 leading-relaxed mb-6 font-light";
        desc.innerText = node.description;
        content.appendChild(desc);
      }

      if (node.content) {
        // UU Card
        const uuBox = document.createElement('div');
        uuBox.className = "p-5 rounded-2xl bg-orange-50 border border-orange-100 text-orange-900 group transition-all hover:bg-orange-100";
        uuBox.innerHTML = `
                    <div class="flex items-center gap-2 mb-2">
                        <span class="w-2 h-2 rounded-full bg-orange-400"></span>
                        <h3 class="text-xs font-bold text-orange-400 uppercase tracking-widest">Regulasi UU 17/2023</h3>
                    </div>
                    <p class="text-sm font-medium leading-relaxed opacity-90">${node.content.uu}</p>
                `;
        content.appendChild(uuBox);

        // PP Card
        const ppBox = document.createElement('div');
        ppBox.className = "p-5 rounded-2xl bg-emerald-50 border border-emerald-100 text-emerald-900 group transition-all hover:bg-emerald-100";
        ppBox.innerHTML = `
                   <div class="flex items-center gap-2 mb-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
                        <h3 class="text-xs font-bold text-emerald-400 uppercase tracking-widest">Regulasi PP 28/2024</h3>
                    </div>
                    <p class="text-sm font-medium leading-relaxed opacity-90">${node.content.pp}</p>
                `;
        content.appendChild(ppBox);
      }

      // Open Panel
      detailPanel.classList.remove('translate-x-[120%]');
    }

    function closePanel() {
      detailPanel.classList.add('translate-x-[120%]');
      state.selected = null;
      render();
    }

    // --- ZOOM & PAN (Standard) ---
    let isDragging = false;
    let startPos = { x: 0, y: 0 };

    function updateTransform() {
      layer.style.transform = `translate(${state.pos.x}px, ${state.pos.y}px) scale(${state.scale})`;
    }

    function zoom(delta) {
      state.scale = Math.max(0.4, Math.min(2, state.scale + delta));
      updateTransform();
    }

    function resetView() {
      state.scale = 1;
      state.pos = { x: 0, y: 50 };
      updateTransform();
    }

    canvasContainer.addEventListener('mousedown', (e) => {
      if (e.target === canvasContainer || e.target === layer) {
        isDragging = true;
        startPos = { x: e.clientX - state.pos.x, y: e.clientY - state.pos.y };
        canvasContainer.classList.add('cursor-grabbing');
      }
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      e.preventDefault();
      state.pos.x = e.clientX - startPos.x;
      state.pos.y = e.clientY - startPos.y;
      updateTransform();
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
      canvasContainer.classList.remove('cursor-grabbing');
    });

    canvasContainer.addEventListener('wheel', (e) => {
      if (e.ctrlKey) {
        e.preventDefault();
        zoom(e.deltaY > 0 ? -0.1 : 0.1);
      }
    }, { passive: false });

    init();
  </script>
</body>

</html>

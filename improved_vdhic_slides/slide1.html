<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        @page { size: 720pt 405pt; margin: 0; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            width: 720pt;
            height: 405pt;
            overflow: hidden;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
        }
        .slide-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            padding: 40pt;
            box-sizing: border-box;
            position: relative;
        }
        .title-main {
            font-size: 54pt;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10pt;
            line-height: 1.1;
            background: linear-gradient(45deg, #ffffff, #e0f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 32pt;
            font-weight: 300;
            text-align: center;
            margin-bottom: 30pt;
            color: #bfdbfe;
        }
        .tagline {
            font-size: 16pt;
            text-align: center;
            margin-bottom: 50pt;
            color: #dbeafe;
            max-width: 600pt;
            line-height: 1.4;
        }
        .footer {
            position: absolute;
            bottom: 30pt;
            text-align: center;
            font-size: 13pt;
            color: #93c5fd;
            width: 100%;
        }
        .accent-shape {
            position: absolute;
            width: 200pt;
            height: 200pt;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            top: -50pt;
            right: -50pt;
        }
        .accent-shape-2 {
            position: absolute;
            width: 150pt;
            height: 150pt;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            bottom: -30pt;
            left: -30pt;
        }
    </style>
</head>
<body>
    <div class="slide-content">
        <div class="accent-shape"></div>
        <div class="accent-shape-2"></div>
        <h1 class="title-main">Value-Based Digital Health<br>Innovation Canvas</h1>
        <h2 class="subtitle">VDHIC Instruction Guide</h2>
        <p class="tagline">From Problem to Impact: Navigating Indonesia's Digital Health Ecosystem</p>
        <p style="font-size: 14pt; color: #bfdbfe; margin-bottom: 10pt;">Featuring the Quintuple Aim Framework</p>
        <div class="footer">
            Australia Awards Fellowship 2025 • Monash University
        </div>
    </div>
</body>
</html>

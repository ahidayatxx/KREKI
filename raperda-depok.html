        // --- RENDERING ENGINE ---

        function init() {
            render();
            centerView();
            // Initial expansion for demo
            if(mindMapData.children && mindMapData.children[0]) {
                toggleExpand(mindMapData.children[0].id, false); 
            }
        }

        function render() {
            layer.innerHTML = '';
            const treeRoot = createTreeNode(mindMapData, 0);
            layer.appendChild(treeRoot);
            updatePanel();
        }

        function createTreeNode(node, level) {
            const container = document.createElement('div');
            container.className = 'flex flex-col items-center node-enter';

            // Vertical Connector (Input)
            if (level > 0) {
                const connector = document.createElement('div');
                connector.className = 'h-6 w-px bg-slate-300 -mt-2 mb-2';
                container.appendChild(connector);
            }

            // Node Card
            const card = document.createElement('div');
            
            // Styles based on level
            let baseClasses = "flex flex-col items-start gap-2 relative z-10 transition-all duration-300 cursor-pointer shadow-sm border-l-4 group select-none";
            let specificClasses = "";
            let widthClass = "";

            if (level === 0) {
                specificClasses = "p-4 rounded-lg bg-white border-slate-600 shadow-md mb-6 w-full max-w-md mx-auto";
            } else if (level === 1) {
                specificClasses = "p-3 rounded-lg bg-emerald-50 border-emerald-500 w-64 transform hover:-translate-y-1";
            } else {
                specificClasses = "p-2 rounded bg-white border-blue-400 hover:bg-blue-50 w-60 text-sm";
            }

            // Active state
            if (state.selected === node.id) {
                specificClasses += " ring-2 ring-offset-1 ring-blue-500 bg-blue-50";
            }

            card.className = `${baseClasses} ${specificClasses}`;
            card.onclick = (e) => {
                e.stopPropagation();
                selectNode(node);
                if (node.children && node.children.length > 0 && !state.expanded[node.id]) {
                    toggleExpand(node.id);
                }
            };

            // Card Header
            const header = document.createElement('div');
            header.className = "flex items-center justify-between w-full";
            
            const titleGroup = document.createElement('div');
            titleGroup.className = "flex items-center gap-2 font-semibold text-slate-800";
            
            if (node.iconName && icons[node.iconName]) {
                const iconSpan = document.createElement('span');
                iconSpan.className = "text-slate-600";
                iconSpan.innerHTML = icons[node.iconName];
                titleGroup.appendChild(iconSpan);
            }
            
            const labelSpan = document.createElement('span');
            labelSpan.className = "leading-tight";
            labelSpan.innerText = node.label;
            titleGroup.appendChild(labelSpan);
            
            header.appendChild(titleGroup);

            // Expand Button
            if (node.children && node.children.length > 0) {
                const btn = document.createElement('button');
                btn.className = "p-1 rounded-full hover:bg-slate-200 text-slate-500 transition-transform";
                const isExpanded = state.expanded[node.id];
                btn.innerHTML = isExpanded ? icons['chevron-down'] : icons['chevron-right'];
                btn.onclick = (e) => {
                    e.stopPropagation();
                    toggleExpand(node.id);
                };
                header.appendChild(btn);
            }

            card.appendChild(header);

            // Description (Level 0 & 1 only)
            if (level < 2 && node.description) {
                const desc = document.createElement('p');
                desc.className = "text-xs text-slate-500 mt-1 leading-snug";
                desc.innerText = node.description;
                card.appendChild(desc);
            }

            container.appendChild(card);

            // Children Rendering
            if (node.children && node.children.length > 0 && state.expanded[node.id]) {
                const childrenWrapper = document.createElement('div');
                childrenWrapper.className = "flex flex-col items-center mt-2 relative";

                // Connector to Children
                const connector = document.createElement('div');
                connector.className = "h-4 w-px bg-slate-300";
                childrenWrapper.appendChild(connector);

                // Horizontal Line
                if (node.children.length > 1) {
                    const hLine = document.createElement('div');
                    hLine.className = "w-[90%] h-px bg-slate-300 mb-2";
                    childrenWrapper.appendChild(hLine);
                }

                // Children Container
                const childrenRow = document.createElement('div');
                childrenRow.className = `flex flex-wrap justify-center gap-4 ${level === 0 ? 'gap-8' : ''}`;
                
                node.children.forEach(child => {
                    const childNode = createTreeNode(child, level + 1);
                    childrenRow.appendChild(childNode);
                });
                
                childrenWrapper.appendChild(childrenRow);
                container.appendChild(childrenWrapper);
            }

            return container;
        }

        // --- INTERACTION LOGIC ---

        function toggleExpand(id, shouldRender = true) {
            state.expanded[id] = !state.expanded[id];
            if(shouldRender) render();
        }

        function selectNode(node) {
            state.selected = node.id;
            state.selectedData = node;
            render(); // Re-render to update active styling
            openPanel();
        }

        function openPanel() {
            detailPanel.classList.remove('translate-x-full');
            detailPanel.classList.add('translate-x-0');
            updatePanel();
        }

        function closePanel() {
            detailPanel.classList.add('translate-x-full');
            detailPanel.classList.remove('translate-x-0');
            state.selected = null;
            state.selectedData = null;
            render();
        }

        function updatePanel() {
            if (!state.selectedData) return;
            const node = state.selectedData;

            // Update Header
            const iconContainer = document.getElementById('panel-icon');
            iconContainer.innerHTML = node.iconName && icons[node.iconName] ? icons[node.iconName] : '';
            document.getElementById('panel-title').innerText = node.label;

            // Update Content
            const contentDiv = document.getElementById('panel-content');
            contentDiv.innerHTML = '';

            // Description
            if (node.description) {
                const descBox = document.createElement('div');
                descBox.className = "bg-blue-50 p-4 rounded-lg border border-blue-100 text-sm text-blue-800";
                descBox.innerText = node.description;
                contentDiv.appendChild(descBox);
            }

            // Detail Content (UU & PP)
            if (node.content) {
                // Section UU
                const sectionUU = document.createElement('div');
                sectionUU.innerHTML = `
                    <h3 class="text-sm font-bold text-slate-500 uppercase mb-2 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-orange-500"></span>
                        Pengaturan dalam Regulasi (UU 17/2023)
                    </h3>
                    <div class="bg-orange-50 p-4 rounded-lg border-l-4 border-orange-400 text-slate-700 text-sm leading-relaxed">
                        ${node.content.uu}
                    </div>
                `;
                contentDiv.appendChild(sectionUU);

                // Section PP
                const sectionPP = document.createElement('div');
                sectionPP.innerHTML = `
                    <h3 class="text-sm font-bold text-slate-500 uppercase mb-2 flex items-center gap-2 mt-6">
                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                        Regulasi Turunan (PP 28/2024)
                    </h3>
                    <div class="bg-emerald-50 p-4 rounded-lg border-l-4 border-emerald-400 text-slate-700 text-sm leading-relaxed">
                        ${node.content.pp}
                    </div>
                `;
                contentDiv.appendChild(sectionPP);
            } else if (node.children) {
                const emptyState = document.createElement('div');
                emptyState.className = "text-center py-10 text-slate-400";
                emptyState.innerHTML = `<p>Kategori Utama</p><p class="text-xs mt-2">Klik tanda (+) di diagram untuk melihat sub-materi.</p>`;
                contentDiv.appendChild(emptyState);
            }
        }

        // --- ZOOM & PAN ---
        let isDragging = false;
        let startPos = { x: 0, y: 0 };

        function updateTransform() {
            layer.style.transform = `translate(${state.pos.x}px, ${state.pos.y}px) scale(${state.scale})`;
        }

        function zoom(delta) {
            const newScale = Math.min(Math.max(state.scale + delta, 0.4), 2);
            state.scale = newScale;
            updateTransform();
        }

        function resetView() {
            state.scale = 1;
            state.pos = { x: 0, y: 0 };
            updateTransform();
        }
        
        function centerView() {
            // Simple centering logic
            const containerWidth = canvasContainer.clientWidth;
            state.pos.x = 0; // Center X handled by flex layout usually, but we can offset if needed
            state.pos.y = 0;
            updateTransform();
        }

        // Mouse Events for Pan
        canvasContainer.addEventListener('mousedown', (e) => {
            if (e.target === canvasContainer || e.target === layer) {
                isDragging = true;
                startPos = { x: e.clientX - state.pos.x, y: e.clientY - state.pos.y };
                canvasContainer.classList.add('cursor-grabbing');
                canvasContainer.classList.remove('cursor-grab');
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            state.pos.x = e.clientX - startPos.x;
            state.pos.y = e.clientY - startPos.y;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            canvasContainer.classList.remove('cursor-grabbing');
            canvasContainer.classList.add('cursor-grab');
        });

        // Wheel Zoom
        canvasContainer.addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
                zoom(e.deltaY > 0 ? -0.1 : 0.1);
            }
        });

        // Initialize App
        init();

    </script>
    
</body>
</html>
